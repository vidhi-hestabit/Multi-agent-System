# shared config applied to all services
x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env.local
  restart: unless-stopped
  networks:
    - agent-net

services:

  # MCP Server
  mcp-server:
    <<: *common
    command: python -m mcp_server.main
    ports:
      - "8000:8000"
    environment:
      MCP_SERVER_PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  news-agent:
    <<: *common
    command: python -m agents.news_agent.main
    ports:
      - "8001:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      NEWS_AGENT_PORT: "8001"
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Weather Agent
  weather-agent:
    <<: *common
    command: python -m agents.weather_agent.main
    ports:
      - "8002:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      WEATHER_AGENT_PORT: "8002"
    depends_on:
      - mcp-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  agent-net:
    driver: bridge
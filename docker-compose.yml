# shared config applied to all services
x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env.local
  restart: unless-stopped
  networks:
    - agent-net

services:

  # MCP Server
  mcp-server:
    <<: *common
    command: python -m mcp_server.main
    ports:
      - "8000:8000"
    environment:
      MCP_SERVER_PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  news-agent:
    <<: *common
    command: python -m agents.news_agent.main
    ports:
      - "8001:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      NEWS_AGENT_PORT: "8001"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Weather Agent
  weather-agent:
    <<: *common
    command: python -m agents.weather_agent.main
    ports:
      - "8002:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      WEATHER_AGENT_PORT: "8002"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      - mcp-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  report-agent:
    <<: *common
    command: python -m agents.report_agent.main
    ports:
      - "8003:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      REPORT_AGENT_PORT: "8003"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  
  sql-agent:
    <<: *common
    command: python -m agents.sql_agent.main
    ports:
      - "8005:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      SQL_AGENT_PORT: "8005"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  
  rag-agent:
    <<: *common
    command: python -m agents.rag_agent.main
    ports:
      - "8006:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      RAG_AGENT_PORT: "8006"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  
  composio-agent:
    <<: *common
    command: python -m agents.composio_agent.main
    ports:
      - "8008:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      COMPOSIO_AGENT_PORT: "8008"
      ENTRY_AGENT_URL: http://entry-agent:8010
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  
  entry-agent:
    <<: *common
    command: python -m agents.entry_agent.main
    ports:
      - "8010:8000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      ENTRY_AGENT_PORT: "8010"
      NEWS_AGENT_HOST: news-agent
      WEATHER_AGENT_HOST: weather-agent
      REPORT_AGENT_HOST: report-agent
      COMPOSIO_AGENT_HOST: composio-agent
      SQL_AGENT_HOST: sql-agent
      RAG_AGENT_HOST: rag-agent
    depends_on:
      mcp-server:
        condition: service_healthy
      news-agent:
        condition: service_healthy
      weather-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      composio-agent:
        condition: service_healthy
      sql-agent:
        condition: service_healthy
      rag-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  agent-net:
    driver: bridge